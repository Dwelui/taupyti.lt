<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taupyti.lt</title>
</head>

<body>
    <form id="product" autocomplete="on">
        <label>
            Name
            <input type="text" name="product_name" placeholder="Milk">
        </label>

        <label>
            Price
            <input type="text" name="product_price" placeholder="1.69">
        </label>

        <label>
            Count
            <input type="number" name="product_count" placeholder="1">
        </label>

        <button type="submit">Add</button>
    </form>
</body>

</html>
